<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راه‌اندازی آپلودر زحل | Zohal Uploader Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg-color);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .step {
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .step.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .form-group.full-width {
                grid-column: span 1;
            }
        }

        label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
        }

        input, select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 15px;
        }

        button {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-test {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
        }

        .btn-test:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .status-loading {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🪐 دستیار آپلودر زحل</h1>
            <p>راه اندازی و پیکربندی اولیه سرور ربات</p>
        </div>

        <div class="steps">
            <div class="step active" onclick="showStep(1)" id="step1-tab">۱. اتصال تلگرام</div>
            <div class="step" onclick="showStep(2)" id="step2-tab">۲. اتصال S3</div>
            <div class="step" onclick="showStep(3)" id="step3-tab">۳. تنظیمات پنل</div>
        </div>

        <form id="setupForm" onsubmit="submitForm(event)">
            <!-- STEP 1: Telegram & Proxy -->
            <div class="step-content active" id="step1">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Telegram API ID</label>
                        <input type="text" id="telegram_api_id" value="{{ config.telegram_api_id }}" required placeholder="مثلا 1234567">
                    </div>
                    <div class="form-group">
                        <label>Telegram API Hash</label>
                        <input type="text" id="telegram_api_hash" value="{{ config.telegram_api_hash }}" required placeholder="کد ۳۲ کاراکتری API Hash">
                    </div>
                    <div class="form-group full-width">
                        <label>توکن ربات تلگرام (Bot Token)</label>
                        <input type="text" id="telegram_bot_token" value="{{ config.telegram_bot_token }}" required placeholder="توکن دریافتی از BotFather">
                    </div>
                    <div class="form-group">
                        <label>نوع پروکسی (جهت دور زدن فیلترینگ تلگرام)</label>
                        <select id="proxy_type" onchange="toggleProxyFields()">
                            <option value="none" {% if config.proxy_type == 'none' %}selected{% endif %}>بدون پروکسی (خارج از ایران)</option>
                            <option value="socks5" {% if config.proxy_type == 'socks5' %}selected{% endif %}>SOCKS5</option>
                            <option value="http" {% if config.proxy_type == 'http' %}selected{% endif %}>HTTP</option>
                            <option value="https" {% if config.proxy_type == 'https' %}selected{% endif %}>HTTPS</option>
                        </select>
                    </div>
                    <div class="form-group proxy-fields">
                        <label>آدرس پروکسی (IP یا Host)</label>
                        <input type="text" id="proxy_host" value="{{ config.proxy_host }}">
                    </div>
                    <div class="form-group proxy-fields">
                        <label>پورت پروکسی</label>
                        <input type="number" id="proxy_port" value="{{ config.proxy_port or 0 }}">
                    </div>
                    <div class="form-group proxy-fields">
                        <label>نام کاربری پروکسی (اختیاری)</label>
                        <input type="text" id="proxy_username" value="{{ config.proxy_username }}">
                    </div>
                    <div class="form-group proxy-fields">
                        <label>رمز عبور پروکسی (اختیاری)</label>
                        <input type="password" id="proxy_password" value="{{ config.proxy_password }}">
                    </div>
                </div>

                <div class="actions">
                    <button type="button" class="btn-test" onclick="testTelegram()">تست اتصال تلگرام ⚡️</button>
                    <button type="button" class="btn-primary" onclick="showStep(2)">مرحله بعد ➡️</button>
                </div>
                <div id="tg-status" class="status-box"></div>
            </div>

            <!-- STEP 2: S3 Configuration -->
            <div class="step-content" id="step2">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ارائه‌دهنده S3</label>
                        <select id="s3_provider">
                            <option value="custom" {% if config.s3_provider == 'custom' %}selected{% endif %}>سفارشی / دیگران</option>
                            <option value="arvan" {% if config.s3_provider == 'arvan' %}selected{% endif %}>ابر آروان (ArvanCloud)</option>
                            <option value="cloudflare" {% if config.s3_provider == 'cloudflare' %}selected{% endif %}>Cloudflare R2</option>
                            <option value="minio" {% if config.s3_provider == 'minio' %}selected{% endif %}>MinIO</option>
                            <option value="aws" {% if config.s3_provider == 'aws' %}selected{% endif %}>AWS S3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ریجن (Region)</label>
                        <input type="text" id="s3_region" value="{{ config.s3_region or 'us-east-1' }}">
                    </div>
                    <div class="form-group full-width">
                        <label>آدرس اندپوینت S3 (Endpoint URL)</label>
                        <input type="text" id="s3_endpoint" value="{{ config.s3_endpoint }}" required placeholder="https://s3.ir-thr-at1.arvanstorage.ir">
                    </div>
                    <div class="form-group">
                        <label>کلید دسترسی (Access Key ID)</label>
                        <input type="text" id="s3_access_key" value="{{ config.s3_access_key }}" required>
                    </div>
                    <div class="form-group">
                        <label>کلید مخفی (Secret Access Key)</label>
                        <input type="password" id="s3_secret_key" value="{{ config.s3_secret_key }}" required>
                    </div>
                    <div class="form-group full-width">
                        <label>نام باکت (Bucket Name)</label>
                        <input type="text" id="s3_bucket" value="{{ config.s3_bucket }}" required placeholder="zohal-storage">
                    </div>
                </div>

                <div class="actions">
                    <button type="button" class="btn-secondary" onclick="showStep(1)">⬅️ مرحله قبل</button>
                    <button type="button" class="btn-test" onclick="testS3()">تست اتصال S3 ⚡️</button>
                    <button type="button" class="btn-primary" onclick="showStep(3)">مرحله بعد ➡️</button>
                </div>
                <div id="s3-status" class="status-box"></div>
            </div>

            <!-- STEP 3: Panel Admin Configuration -->
            <div class="step-content" id="step3">
                <div class="form-grid">
                    <div class="form-group">
                        <label>شناسه عددی تلگرام مدیر ربات (Owner ID)</label>
                        <input type="number" id="owner_id" value="{{ config.owner_id or '' }}" required placeholder="123456789">
                    </div>
                    <div class="form-group">
                        <label>رمز عبور وب‌پنل مدیریت</label>
                        <input type="password" id="web_password" value="{{ config.web_password }}" required placeholder="حداقل ۶ کاراکتر">
                    </div>
                </div>

                <div class="actions">
                    <button type="button" class="btn-secondary" onclick="showStep(2)">⬅️ مرحله قبل</button>
                    <button type="submit" class="btn-primary">ذخیره و اجرای ربات 🪐</button>
                </div>
                <div id="setup-status" class="status-box"></div>
            </div>
        </form>
    </div>

    <script>
        function toggleProxyFields() {
            const pType = document.getElementById("proxy_type").value;
            const fields = document.querySelectorAll(".proxy-fields");
            fields.forEach(el => {
                el.style.display = pType === "none" ? "none" : "flex";
            });
        }
        
        // Run once on load
        toggleProxyFields();

        function showStep(stepNum) {
            document.querySelectorAll(".step-content").forEach(el => el.classList.remove("active"));
            document.querySelectorAll(".step").forEach(el => el.classList.remove("active"));
            
            document.getElementById(`step${stepNum}`).classList.add("active");
            document.getElementById(`step${stepNum}-tab`).classList.add("active");
        }

        function getFormData() {
            return {
                telegram_api_id: document.getElementById("telegram_api_id").value,
                telegram_api_hash: document.getElementById("telegram_api_hash").value,
                telegram_bot_token: document.getElementById("telegram_bot_token").value,
                proxy_type: document.getElementById("proxy_type").value,
                proxy_host: document.getElementById("proxy_host").value,
                proxy_port: parseInt(document.getElementById("proxy_port").value) || 0,
                proxy_username: document.getElementById("proxy_username").value,
                proxy_password: document.getElementById("proxy_password").value,
                s3_endpoint: document.getElementById("s3_endpoint").value,
                s3_access_key: document.getElementById("s3_access_key").value,
                s3_secret_key: document.getElementById("s3_secret_key").value,
                s3_bucket: document.getElementById("s3_bucket").value,
                s3_region: document.getElementById("s3_region").value,
                s3_provider: document.getElementById("s3_provider").value,
                owner_id: parseInt(document.getElementById("owner_id").value) || 0,
                web_password: document.getElementById("web_password").value
            };
        }

        async function testTelegram() {
            const statusBox = document.getElementById("tg-status");
            statusBox.style.display = "block";
            statusBox.className = "status-box status-loading";
            statusBox.innerText = "⏳ در حال آزمایش اتصال به سرورهای تلگرام...";
            
            try {
                const res = await fetch("/api/setup/test-telegram", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(getFormData())
                });
                const data = await res.json();
                
                if (data.status === "success") {
                    statusBox.className = "status-box status-success";
                    statusBox.innerText = data.message;
                } else {
                    statusBox.className = "status-box status-error";
                    statusBox.innerText = data.message;
                }
            } catch (err) {
                statusBox.className = "status-box status-error";
                statusBox.innerText = "خطا در برقراری ارتباط با سرور محلی: " + err;
            }
        }

        async function testS3() {
            const statusBox = document.getElementById("s3-status");
            statusBox.style.display = "block";
            statusBox.className = "status-box status-loading";
            statusBox.innerText = "⏳ در حال آزمایش اتصال به باکت S3...";
            
            try {
                const res = await fetch("/api/setup/test-s3", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(getFormData())
                });
                const data = await res.json();
                
                if (data.status === "success") {
                    statusBox.className = "status-box status-success";
                    statusBox.innerText = data.message;
                } else {
                    statusBox.className = "status-box status-error";
                    statusBox.innerText = data.message;
                }
            } catch (err) {
                statusBox.className = "status-box status-error";
                statusBox.innerText = "خطا در ارتباط با سرور محلی: " + err;
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            const statusBox = document.getElementById("setup-status");
            statusBox.style.display = "block";
            statusBox.className = "status-box status-loading";
            statusBox.innerText = "⏳ در حال ذخیره تنظیمات و راه‌اندازی ربات...";
            
            try {
                const res = await fetch("/api/setup/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(getFormData())
                });
                const data = await res.json();
                
                if (data.status === "success" || data.status === "warning") {
                    statusBox.className = "status-box status-success";
                    statusBox.innerText = data.message + " انتقال به پنل مدیریت تا لحظاتی دیگر...";
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2500);
                } else {
                    statusBox.className = "status-box status-error";
                    statusBox.innerText = data.message;
                }
            } catch (err) {
                statusBox.className = "status-box status-error";
                statusBox.innerText = "خطا در ارسال اطلاعات: " + err;
            }
        }
    </script>
</body>
</html>
